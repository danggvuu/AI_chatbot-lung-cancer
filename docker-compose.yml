version: '3.8'

services:
  chatbot:
    build: .
    container_name: lungcare-chatbot
    ports:
      - "5080:5080"
    environment:
      # URL to Ollama running on the host machine.
      # host.docker.internal resolves to the host machine's IP.
      - OLLAMA_API_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - PORT=5080
    # Add host routing configuration to make host.docker.internal work on Linux hosts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
